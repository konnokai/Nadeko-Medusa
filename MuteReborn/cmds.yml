togglemutereborn:
  desc: "切換死者蘇生啟用狀態"
  args:
    - ""
settingmutereborn:
  desc: "設定甦生券的設置\nBuyMuteRebornTicketCost: 每張甦生券需消耗多少貨幣\n(預設 1 萬，可設定範圍 1000 ~ 100000)\nEachTicketIncreaseMuteTime: 每張甦生券可增加幾分鐘勞改時間\n(預設 5 分鐘，可設定範圍 5 ~ 120 分鐘)\nEachTicketDecreaseMuteTime: 每張甦生券可減少幾分鐘勞改時間\n(預設 30 分鐘，可設定範圍 5 ~ 120 分鐘)\nMaxIncreaseMuteTime: 最大可增加的勞改時間\n(預設 30 分鐘，可設定範圍 10 ~ 360 分鐘)\n\n若未輸入參數時則顯示現在設定的數值"
  args:
    - ""
    - "BuyMuteRebornTicketCost 10000"
    - "EachTicketIncreaseMuteTime 5"
    - "EachTicketDecreaseMuteTime 30"
    - "MaxIncreaseMuteTime 30"
addmuterebornticketnum:
  desc: "新增指定使用者的死者蘇生券數量(可為負數)\n需先使用 ToggleMuteReborn 指令開啟狀態才可使用"
  args:
    - "1 @某人"
    - "-1 @某人"
listmuterebornticketnum:
  desc: "顯示死者蘇生券持有數量清單"
  args:
    - ""
    - "3"
showmuterebornticketnum:
  desc: "顯示自己或特定使用者的死者蘇生券持有數量"
  args:
    - ""
    - "@某人"
buymuterebornticket:
  desc: "花費貨幣購買幾張死者蘇生券 (未輸入數量則為購買一張)"
  args:
    - ""
    - "10"
sine:
  desc: "喜內! 卡蚯蚓!\n消耗一張死者蘇生券來勞改指定使用者(可疊加時間)\n勞改時間依各伺服器而定(預設五分鐘)"
  args:
    - "@某人"
    - "(UserId)"
setrecordchannel:
  desc: "設定賭局結束的紀錄頻道"
  args:
    - "#頻道"
sethsrbetstartmessage:
  desc: "設定詞條賭局開始時的訊息"
  args:
    - "訊息"
    - "@賭徒 開賭啦"
hsrstartbetrelic:
  desc: "開始詞條賭局"
  args:
    - "附加訊息"
hsrendbetrelic:
  desc: "結束賭局"
  args:
    - ""
    